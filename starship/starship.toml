[directory]
style = '#707070'
format = "[$path]($style)"
truncation_length = 8
truncation_symbol = ""
truncate_to_repo = false

[directory.substitutions]
"/ranger097_nixos_dotfiles" = "dotfiles"
"Documents" = "DOCUMENTS"
"Downloads" = "DOWNLOADS"
"Music" = "MUSIC"
"Pictures" = "PICTURES"
"Home" = "HOME"
"~" = ""


[git_branch]
symbol = "´Éİ"
style = '#808080'
format = '[[ $symbol $branch ](#69491D)]($style)'

