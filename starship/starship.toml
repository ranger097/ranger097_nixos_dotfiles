format = """
[  ](fg:#69491D bg:none)\
[](fg:#101010 bg:none)\
[█](fg:#101010 bg:none)\
[󰏒 ](fg:#69491D bg:#101010)\
[█](fg:#101010 bg:none)\
[ ](fg:#101010 bg:#69491D)\
[ ](fg:#69491D bg:#303030)\
[ ](fg:#303030 bg:#101010)\
[ 夜型人間 ](fg:#69491D bg:#101010)\
[ ](fg:#101010 bg:#69491D)\
[ ](fg:#69491D bg:#303030)\
[ ](fg:#303030 bg:#101010)\
[ ](fg:#101010 bg:none)\
$directory\
[](fg:#505050)\
$git_branch\
$git_status\
[](fg:#505050)\
$nodejs\
$rust\
$golang\
$php\
$elixir\
