"Documents" = "DOCUMENTS"
"Downloads" = "DOWNLOADS"
"Music" = "MUSIC"
"Pictures" = "PICTURES"
"Home" = "HOME"
"~" = ""


[git_branch]
symbol = "пҗҳ"
style = '#808080'
format = '[[ $symbol $branch ](#69491D)]($style)'

[git_status]
style = '#505050'
format = '[[($all_status$ahead_behind)](fg:#909090)]($style)'

