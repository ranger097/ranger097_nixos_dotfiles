[ $fill](fg:#505050)[](#505050)$time\
[](#ffffff)\ 
\n$character"""

[directory]
style = '#707070'
format = "[$path]($style)"
truncation_length = 8
truncation_symbol = ""
truncate_to_repo = false

[directory.substitutions]
"/ranger097_nixos_dotfiles/starship" = "STARSHIP CONFIG"
"/ranger097_nixos_dotfiles/ghostty" = "GHOSTTY"
"/ranger097_nixos_dotfiles/kvantum" = "KVANTUM"
"/ranger097_nixos_dotfiles/waybar" = "WAYBAR"
"/ranger097_nixos_dotfiles/rofi" = "ROFI"
"/ranger097_nixos_dotfiles/wallpapers" = "WALLPAPERS"
"/ranger097_nixos_dotfiles/hypr" = "HYPRLAND"
"/ranger097_nixos_dotfiles/wlogout" = "WLOGOUT"
"/ranger097_nixos_dotfiles" = "NIXOS CONFIGS"
"Projects" = "CODING PROJECTS"
"~/.config" = "CONFIGS"
"Documents" = "DOCUMENTS"
"Downloads" = "DOWNLOADS"
"Music" = "MUSIC"
"Pictures" = "PICTURES"
"Home" = "HOME"
"~" = ""


[git_branch]
symbol = ""
style = '#808080'
format = '[[ $symbol $branch ](#69491D)]($style)'

[git_status]
style = '#505050'
format = '[[($all_status$ahead_behind)](fg:#909090)]($style)'

[nodejs]
symbol = ""
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[rust]
symbol = ""
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[golang]
symbol = "󰟓"
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[elixir]
symbol = ""
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[java]
symbol = ""
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[python]
symbol = ""
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[c]
symbol = ""
style = "bg:#000000"
format = '[[ $symbol ($version) ](fg:#C83C3C bg:#000000)]($style)'

[fill]
symbol = " "
style = "fg:#B4B4B4" 

[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ $time](fg:#CAAE48)]($style)'

[character]
format = "[  ](fg:#69491D) "
